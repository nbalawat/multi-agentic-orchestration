# Locust Configuration File
# Default configuration for RAPIDS load tests

# Base URL
host = http://127.0.0.1:9403

# Web UI
web-host = 127.0.0.1
web-port = 8089

# Default load parameters
users = 100
spawn-rate = 10
run-time = 5m

# Logging
loglevel = INFO
logfile = reports/locust.log

# CSV output
csv = reports/default
csv-full-history = true

# HTML report
html = reports/default.html

# Exit code settings
# Exit code 0 if error rate < 1%
# Exit code 1 if error rate >= 1%
stop-timeout = 10
