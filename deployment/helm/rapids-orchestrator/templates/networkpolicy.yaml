{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rapids-orchestrator.fullname" . }}-backend
  labels:
    {{- include "rapids-orchestrator.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rapids-orchestrator.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9403
    # Allow ingress from frontend (for WebSocket)
    - from:
        - podSelector:
            matchLabels:
              {{- include "rapids-orchestrator.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9403
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow egress to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              {{- include "rapids-orchestrator.postgresql.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    # Allow egress to Claude API (Anthropic)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rapids-orchestrator.fullname" . }}-frontend
  labels:
    {{- include "rapids-orchestrator.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rapids-orchestrator.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow egress to backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "rapids-orchestrator.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9403
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rapids-orchestrator.fullname" . }}-postgresql
  labels:
    {{- include "rapids-orchestrator.postgresql.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rapids-orchestrator.postgresql.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from backend
    - from:
        - podSelector:
            matchLabels:
              {{- include "rapids-orchestrator.backend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    # Allow ingress from migration jobs
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: migrations
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
{{- end }}
