{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rapids-orchestrator.fullname" . }}-postgresql
  labels:
    {{- include "rapids-orchestrator.postgresql.labels" . | nindent 4 }}
spec:
  type: {{ .Values.postgresql.service.type }}
  ports:
    - name: postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
      protocol: TCP
    {{- if .Values.postgresql.metrics.enabled }}
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
    {{- end }}
  selector:
    {{- include "rapids-orchestrator.postgresql.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rapids-orchestrator.fullname" . }}-postgresql-headless
  labels:
    {{- include "rapids-orchestrator.postgresql.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
      protocol: TCP
  selector:
    {{- include "rapids-orchestrator.postgresql.selectorLabels" . | nindent 4 }}
{{- end }}
