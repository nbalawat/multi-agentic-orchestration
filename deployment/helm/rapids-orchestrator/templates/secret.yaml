apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rapids-orchestrator.fullname" . }}
  labels:
    {{- include "rapids-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.backend.secretEnv.ANTHROPIC_API_KEY | required "backend.secretEnv.ANTHROPIC_API_KEY is required" | quote }}
  JWT_SECRET_KEY: {{ .Values.backend.secretEnv.JWT_SECRET_KEY | required "backend.secretEnv.JWT_SECRET_KEY is required" | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | required "postgresql.auth.password is required" | quote }}
  DATABASE_URL: {{ include "rapids-orchestrator.postgresql.connectionString" . | quote }}
