{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rapids-orchestrator.fullname" . }}-migrations-{{ .Release.Revision }}
  labels:
    {{- include "rapids-orchestrator.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "rapids-orchestrator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "rapids-orchestrator.serviceAccountName" . }}
      initContainers:
        - name: wait-for-postgresql
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "rapids-orchestrator.fullname" . }}-postgresql -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: migrations
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag | default .Chart.AppVersion }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting database migrations..."

              # Run all migration files in order
              for migration in /app/orchestrator/db/migrations/*.sql; do
                if [ -f "$migration" ]; then
                  echo "Running migration: $(basename $migration)"
                  PGPASSWORD=$POSTGRES_PASSWORD psql -h {{ include "rapids-orchestrator.fullname" . }}-postgresql \
                    -p 5432 \
                    -U {{ .Values.postgresql.auth.username }} \
                    -d {{ .Values.postgresql.auth.database }} \
                    -f "$migration" || {
                      echo "Migration failed: $(basename $migration)"
                      exit 1
                    }
                fi
              done

              echo "All migrations completed successfully!"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "rapids-orchestrator.fullname" . }}
                  key: POSTGRES_PASSWORD
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
