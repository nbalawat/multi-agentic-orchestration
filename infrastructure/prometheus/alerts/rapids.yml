# Alert rules for RAPIDS Meta-Orchestrator

groups:
  - name: rapids_critical
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # High API latency
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is {{ $value }}s over the last 5 minutes"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolHigh
        expr: db_connection_pool_size{state="active"} / (db_connection_pool_size{state="active"} + db_connection_pool_size{state="idle"}) > 0.9
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Connection pool usage is {{ $value | humanizePercentage }}"

      # High disk usage
      - alert: HighDiskUsage
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage critically high"
          description: "Only {{ $value | humanizePercentage }} disk space remaining"

      # Service down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"

  - name: rapids_warning
    interval: 60s
    rules:
      # Elevated error rate
      - alert: ElevatedErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated error rate"
          description: "Error rate is {{ $value | humanizePercentage }}"

      # Elevated API latency
      - alert: ElevatedAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated API latency"
          description: "P95 latency is {{ $value }}s"

      # Database connection pool warning
      - alert: DatabaseConnectionPoolWarning
        expr: db_connection_pool_size{state="active"} / (db_connection_pool_size{state="active"} + db_connection_pool_size{state="idle"}) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool usage high"
          description: "Connection pool usage is {{ $value | humanizePercentage }}"

      # High disk usage warning
      - alert: HighDiskUsageWarning
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage high"
          description: "Only {{ $value | humanizePercentage }} disk space remaining"

      # High AI costs
      - alert: HighAICosts
        expr: increase(ai_tokens_used_total[24h]) * 0.000001 > 100
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High AI token usage"
          description: "Estimated daily cost exceeds $100"

      # Long-running agent
      - alert: LongRunningAgent
        expr: agent_execution_seconds > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent execution taking too long"
          description: "Agent {{ $labels.agent_id }} has been running for {{ $value }}s"
