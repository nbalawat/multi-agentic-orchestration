services:
  postgres:
    image: postgres:16-alpine
    container_name: rapids-postgres
    environment:
      POSTGRES_USER: rapids
      POSTGRES_PASSWORD: rapids_dev_2024
      POSTGRES_DB: rapids_orchestrator
    ports:
      - "5434:5432"
    volumes:
      - rapids_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rapids -d rapids_orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  rapids_pgdata:
